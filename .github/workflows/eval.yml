name: Regression Eval

on:
  pull_request:
    paths:
      - "prompts/**"
      - "golden_dataset/**"

permissions:
  contents: read
  pull-requests: write

jobs:
  eval:
    name: Run eval on changed prompts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync

      - name: Detect changed prompt
        id: changed
        run: |
          PROMPT=$(git diff --name-only origin/${{ github.base_ref }}...HEAD \
            -- 'prompts/*.yaml' | head -1)
          echo "prompt=${PROMPT:-prompts/incident_triage_v1.yaml}" >> "$GITHUB_OUTPUT"

      - name: Restore baseline DB
        uses: actions/cache@v4
        with:
          path: evals/runs.db
          key: eval-baseline-${{ github.base_ref }}
          restore-keys: |
            eval-baseline-

      - name: Run eval
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        run: |
          uv run lrd run \
            --prompt "${{ steps.changed.outputs.prompt }}" \
            --dataset golden_dataset/incidents.json \
            --report evals/report.html \
            --diff \
            --save \
            --notify \
            --fail-on-critical

      - name: Generate PR comment
        if: always()
        run: |
          uv run lrd pr-comment --output pr_comment.md

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-report
          path: |
            evals/report.html
            pr_comment.md

      - name: Comment on PR
        if: always() && hashFiles('pr_comment.md') != ''
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          path: pr_comment.md
