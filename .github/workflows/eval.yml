name: Regression Eval

on:
  pull_request:
    paths:
      - "prompts/**"
      - "golden_dataset/**"

permissions:
  contents: read
  pull-requests: write

jobs:
  eval:
    name: Run eval on changed prompts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Restore baseline DB
        uses: actions/cache@v4
        with:
          path: evals/runs.db
          key: eval-baseline-${{ github.base_ref }}
          restore-keys: |
            eval-baseline-

      - name: Run eval
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        run: |
          uv run lrd run \
            --prompt prompts/classifier_v1.yaml \
            --dataset golden_dataset/support_emails.json \
            --report evals/report.html \
            --diff \
            --save \
            --notify \
            --fail-on-critical

      - name: Generate PR comment
        if: always()
        id: pr_comment
        run: |
          uv run python -c "
          import asyncio, sys
          from pathlib import Path
          from llm_regression_detector.diff.analyzer import Analyzer
          from llm_regression_detector.report.pr_comment import render_pr_comment
          from llm_regression_detector.storage.sqlite import SQLiteStorage

          async def go():
              s = SQLiteStorage(Path('evals/runs.db'))
              await s.initialize()
              runs = await s.recent('support-email-classifier', limit=2)
              if not runs:
                  return ''
              candidate = runs[0]
              baseline = runs[1] if len(runs) > 1 else None
              diff = Analyzer().diff(baseline, candidate) if baseline else None
              return render_pr_comment(candidate, diff)
          out = asyncio.run(go())
          Path('pr_comment.md').write_text(out)
          print(out)
          "

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-report
          path: |
            evals/report.html
            pr_comment.md

      - name: Comment on PR
        if: always() && hashFiles('pr_comment.md') != ''
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          path: pr_comment.md
